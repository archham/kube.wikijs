---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wikijs-sitemap-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wikijs-sitemap
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: generator
              image: postgres:16
              env:
              - name: DB_TYPE
                value: "postgres"
              - name: DB_HOST
                value: "postgresql"
              - name: DB_PORT
                value: "5432"
              - name: DB_PASS
                valueFrom:
                  secretKeyRef:
                    name: postgresql-secret
                    key: db_pass
              - name: DB_NAME
                valueFrom:
                  secretKeyRef:
                    name: postgresql-secret
                    key: db_name
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: postgresql-secret
                    key: db_user
              command:
                - /bin/sh
                - -c
                - |
                  PGPASSWORD="$DB_PASS" psql \
                    -h "$DB_HOST" \
                    -U "$DB_USER" \
                    -d "$POSTGRES_DB" \
                    -t -A -c "
                  SELECT '<url><loc>https://wiki.bitbull.ch/' || path || '</loc><lastmod>' ||
                         to_char(\"updatedAt\"::timestamp, 'YYYY-MM-DD\"T\"HH24:MI:SS\"Z\"') ||
                         '</lastmod></url>'
                  FROM pages
                  WHERE \"isPublished\" = true
                  ORDER BY path ASC;
                  " | (
                  echo '<?xml version="1.0" encoding="UTF-8"?>'
                  echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
                  cat
                  echo '</urlset>'
                  ) > /data/sitemap.xml
              volumeMounts:
                - name: sitemap
                  mountPath: /data
          restartPolicy: OnFailure
          volumes:
            - name: sitemap
              persistentVolumeClaim:
                claimName: wikijs-sitemap-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikijs-sitemap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikijs-sitemap
  template:
    metadata:
      labels:
        app: wikijs-sitemap
    spec:
      containers:
        - name: server
          image: python:3-alpine
          command: ["python3", "-m", "http.server", "8080"]
          volumeMounts:
            - name: sitemap
              mountPath: /data
          workingDir: /data
          ports:
            - containerPort: 8080
      volumes:
        - name: sitemap
          persistentVolumeClaim:
            claimName: wikijs-sitemap-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wikijs-sitemap
spec:
  selector:
    app: wikijs-sitemap
  ports:
    - port: 80
      targetPort: 8080
